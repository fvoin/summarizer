name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-arm64:
    runs-on: macos-14          # Apple Silicon (arm64) — free
    name: Build (Apple Silicon)

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-arm64-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-arm64-

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.summarizer/models/base
          key: whisper-base-v2

      - name: Cache ffmpeg binary
        uses: actions/cache@v4
        with:
          path: bundled_ffmpeg
          key: ffmpeg-arm64-v1

      - name: Build app
        env:
          DMG_NAME: Summarizer-AppleSilicon.dmg
        run: bash build.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Summarizer-AppleSilicon
          path: dist/Summarizer-AppleSilicon.dmg
          retention-days: 7

  release:
    needs: build-arm64
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - name: Download Apple Silicon DMG
        uses: actions/download-artifact@v4
        with:
          name: Summarizer-AppleSilicon
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Summarizer ${{ github.ref_name }}
          files: dist/Summarizer-AppleSilicon.dmg
          generate_release_notes: true
